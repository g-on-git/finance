<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finora Capital</title>
    <link rel="shortcut icon" href="/assets/images/finora-logo-white.svg" />
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/dist/css/main.css" />
    <link rel="stylesheet" href="/assets/css/swiper-bundle.min.css" />
  </head>
  <body>
    <section class="auth-section py-5">
      <div class="container">
        <div class="auth-wrapper mx-auto">
          <div class="row g-4 align-items-stretch">
            <!-- Left Side -->

            <div class="col-lg-6">
              <div class="auth-content h-100 d-flex align-items-center">
                <div class="auth-form-wrapper w-100">
                  <div class="auth-header text-center mb-4">
                    <h2 class="auth-title">Create Your Account</h2>
                    <p class="auth-subtitle mb-0">
                      Join Finora today and take the first step toward smarter
                      financial solutions.
                    </p>
                  </div>

                  <form class="auth-form">
                    <div class="mb-3">
                      <label for="email" class="form-label auth-label"
                        >Full Name</label
                      >
                      <input
                        type="email"
                        class="form-control auth-input"
                        id="email"
                        placeholder="Enter your full name"
                      />
                    </div>

                    <div class="mb-3">
                      <label for="email" class="form-label auth-label"
                        >Email</label
                      >
                      <input
                        type="email"
                        class="form-control auth-input"
                        id="email"
                        placeholder="Enter your email address"
                      />
                    </div>

                    <div class="mb-2">
                      <label for="password" class="form-label auth-label"
                        >Password</label
                      >
                      <input
                        type="password"
                        class="form-control auth-input"
                        id="password"
                        placeholder="Enter your password"
                      />
                    </div>

                    <div class="mb-2">
                      <label
                        for="confirm-password"
                        class="form-label auth-label"
                        >Confirm Password</label
                      >
                      <input
                        type="password"
                        class="form-control auth-input"
                        id="confirm-password"
                        placeholder=""
                      />
                    </div>

                    <div
                      class="auth-options d-flex justify-content-between align-items-center mb-4"
                    >
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="rememberMe"
                        />
                        <label
                          class="form-check-label auth-check-label"
                          for="rememberMe"
                        >
                          I agree to the Terms & Conditions and Privacy Policy
                        </label>
                      </div>
                    </div>

                    <div class="d-grid mb-4">
                      <button
                        type="submit"
                        class="btn btn-primary auth-submit-btn"
                      >
                        Create Account
                      </button>
                    </div>

                    <p class="auth-footer-text text-center mb-0">
                      Already have an account
                      <a href="login.html" class="auth-link auth-register-link"
                        >Sign In</a
                      >
                    </p>
                  </form>
                </div>
              </div>
            </div>

            <!-- Right Side -->

            <div class="col-lg-6">
              <div
                class="auth-banner h-100 position-relative overflow-hidden rounded-2"
              >
                <div class="auth-banner-thumb h-100">
                  <img
                    src="/assets/images/register-img.png"
                    alt="Finance login banner"
                    class="img-fluid w-100 h-100 object-fit-cover"
                  />
                </div>

                <div class="auth-banner-overlay"></div>

                <div
                  class="auth-banner-content d-flex flex-column justify-content-between h-100 position-absolute top-0 start-0 w-100"
                >
                  <div class="auth-brand">
                    <a href="index.html" class="auth-logo d-inline-block">
                      <img
                        src="/assets/images/logo-auth.svg"
                        alt="Finora Capital"
                      />
                    </a>
                  </div>

                  <div class="auth-banner-text">
                    <p class="auth-quote mb-2">
                      “Smart financial decisions start with the right tools.”
                    </p>
                    <span class="auth-quote-desc">
                      Manage your account securely and stay in control anytime.
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
